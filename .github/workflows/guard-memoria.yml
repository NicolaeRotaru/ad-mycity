name: Guardiano memoria — preferisci memoria-ad

# Regola (CLAUDE.md + cervello/giro.md "DOVE PUBBLICARE"):
#   la MEMORIA del vault ha UN SOLO scrittore = il ramo 'memoria-ad' (quello che legge il Pannello).
#   'main' è per il CODICE.
# Questo check AVVISA (non blocca) quando un PR verso 'main' tocca la memoria: la strada giusta è
# base 'memoria-ad'. La rete di sicurezza è il workflow 'forward-memoria': anche se la memoria finisce
# su 'main', porta le NUOVE consegne su 'memoria-ad' → l'AD le legge comunque. Qui avvisiamo soltanto
# per non lasciar divergere i due rami e per ricordare la strada giusta (niente red-X bloccante).

on:
  pull_request:
    branches: [main]

jobs:
  memoria-solo-su-memoria-ad:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: La memoria va su 'memoria-ad', non su 'main'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || true

          # Le stesse 4 cartelle che giro.sh tratta come MEM_DIRS (memoria accumulata dell'AD).
          CAMBIATI="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          echo "File modificati dal PR:"
          echo "$CAMBIATI" | sed 's/^/  /'

          VIETATI="$(printf '%s\n' "$CAMBIATI" | grep -E '^(MyCity-Vault|consegne|creativi|memoria-squadra)/' || true)"

          if [ -n "$VIETATI" ]; then
            echo ""
            echo "::warning title=Memoria su main::Questo PR mette memoria su 'main'. La strada giusta è base 'memoria-ad' (il ramo che il Pannello legge). Le NUOVE consegne verranno comunque portate su 'memoria-ad' dal workflow 'forward-memoria', ma per non far divergere i rami usa base 'memoria-ad'. (Vedi cervello/giro.md 'DOVE PUBBLICARE'.)"
            echo ""
            echo "Memoria toccata da questo PR (andrà auto-forwardata su memoria-ad):"
            printf '%s\n' "$VIETATI" | sed 's/^/  • /'
            exit 0
          fi

          echo ""
          echo "OK: il PR tocca solo codice. Nessuna modifica di memoria su 'main'."
