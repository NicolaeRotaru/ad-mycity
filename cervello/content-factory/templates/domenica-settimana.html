<!doctype html>
<!--
  Post domenica sera — "Fai il turno per la settimana" (Pane Quotidiano).
  Segnaposto: {{kicker}} {{hook}} {{sottotitolo}} {{bottega}} {{badge}} {{handle}}
  Sfondo: gradiente serale blu → terracotta. Tipografico, senza foto stock.
-->
<html lang="it">
<head>
<meta charset="utf-8">
<style>
  :root{
    --terracotta:#C0492C; --senape:#E8A33D; --oliva:#5A7C42;
    --bordeaux:#B82A28; --inchiostro:#2C2A28; --panna:#FBF7F0; --bianco:#FFFFFF;
    --sera:#1a2744;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%}
  body{
    font-family: Georgia,'Times New Roman',serif;
    width:100vw;height:100vh;position:relative;overflow:hidden;
    background:linear-gradient(165deg, var(--sera) 0%, #2d3a52 38%, var(--terracotta) 100%);
    color:var(--panna);
    display:flex;flex-direction:column;justify-content:space-between;
    padding:80px 64px 100px;
  }
  .kicker{
    font-family:'Helvetica Neue',Arial,sans-serif;font-weight:700;
    text-transform:uppercase;letter-spacing:6px;font-size:26px;
    color:var(--senape);opacity:.95;
  }
  .hook{font-size:72px;line-height:1.05;font-weight:700;margin:28px 0 12px}
  .sottotitolo{font-size:48px;line-height:1.15;color:var(--senape);font-weight:700;margin-bottom:48px}
  .bottega{
    font-family:'Helvetica Neue',Arial,sans-serif;font-size:34px;line-height:1.45;
    background:rgba(251,247,240,.12);border:2px solid rgba(251,247,240,.25);
    border-radius:20px;padding:32px 36px;max-width:92%;
  }
  .badge{
    display:inline-block;margin-top:36px;
    background:var(--oliva);color:var(--panna);
    font-family:'Helvetica Neue',Arial,sans-serif;font-weight:700;
    font-size:28px;padding:18px 32px;border-radius:40px;
  }
  .footer{
    border-top:3px solid rgba(251,247,240,.35);padding-top:28px;
    display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;
  }
  .tagline{font-size:28px;font-style:italic;opacity:.92}
  .brand{font-size:38px;font-weight:700}
  .handle{font-family:'Helvetica Neue',Arial,sans-serif;font-size:26px;font-weight:700;opacity:.9}
</style>
</head>
<body>
  <div class="top">
    <div class="kicker">{{kicker}}</div>
    <div class="hook">{{hook}}</div>
    <div class="sottotitolo">{{sottotitolo}}</div>
    <div class="bottega">{{bottega}}</div>
    <div class="badge">{{badge}}</div>
  </div>
  <div class="footer">
    <div>
      <div class="brand">MyCity 🐎</div>
      <div class="tagline">La spesa che tiene viva la città.</div>
    </div>
    <div class="handle">{{handle}}</div>
  </div>
</body>
</html>
