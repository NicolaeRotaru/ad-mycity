<!doctype html>
<!--
  Template categoria NUOVA — "PROVA SOCIALE / TESTIMONIANZA (evoluta)".
  La fiducia che converte: la CITAZIONE è l'eroe (Fraunces grande, virgolette).
  Sotto: nome + quartiere (anche solo "Giulia, Centro storico"). Una stella di fiducia.
  Tono: "il Vicino Orgoglioso" — qui sincero/caldo. Fondo panna, accento OLIVA (fresco/positivo).
  Segnaposto: {{citazione}} {{nome}} {{zona}}
  Variabili colore con fallback identici al brand (lo script di render le ri-inietta dal brand.mjs).
  Formato: portrait 1080x1350.

  ⚠️  ONESTA: MyCity oggi ha 0 clienti reali. La citazione qui dentro DEVE essere marcata come
      ESEMPIO finche' non c'e' una testimonianza vera raccolta (telefonata post-consegna + consenso).
      Il badge ".esempio" in alto a destra serve proprio a non spacciare un esempio per realta'.
-->
<html lang="it">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,500;9..144,0,600;9..144,0,700;9..144,0,900;9..144,1,600;9..144,1,700&family=Inter:wght@400;600;700;800&display=swap');
  :root{
    --terracotta:#C0492C; --senape:#E8A33D; --oliva:#5A7C42;
    --bordeaux:#B82A28; --inchiostro:#2C2A28; --panna:#FBF7F0; --bianco:#FFFFFF;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%}
  body{
    font-family:'Inter','Helvetica Neue',Arial,sans-serif;
    background:var(--panna); color:var(--inchiostro);
    width:1080px; height:1350px; position:relative; overflow:hidden;
  }
  /* fondo panna con velo carta + filo oliva sottile in alto e in basso (fresco/positivo) */
  .carta{
    position:absolute; inset:0;
    background:
      radial-gradient(circle at 82% 8%, rgba(90,124,66,.06), transparent 42%),
      radial-gradient(circle at 12% 96%, rgba(90,124,66,.05), transparent 40%),
      var(--panna);
  }
  .bordo{ position:absolute; inset:46px; border:2px solid rgba(90,124,66,.30); border-radius:10px; }
  .filo-top{ position:absolute; top:46px; left:46px; right:46px; height:10px; background:var(--oliva); border-radius:10px 10px 0 0; }

  /* occhiello: cosa stiamo guardando */
  .occhiello{
    position:absolute; top:108px; left:0; right:0; text-align:center;
    font-family:'Inter',sans-serif; text-transform:uppercase;
    letter-spacing:7px; font-size:23px; font-weight:800; color:var(--oliva);
  }

  /* badge ESEMPIO (onesta): in alto a destra, dentro il bordo. Va RIMOSSO con la testimonianza vera. */
  .esempio{
    position:absolute; top:74px; right:74px; z-index:6;
    background:var(--bordeaux); color:var(--panna);
    font-family:'Inter',sans-serif; font-weight:800; font-size:16px;
    letter-spacing:1.5px; text-transform:uppercase;
    padding:9px 14px; border-radius:8px; transform:rotate(3deg);
    box-shadow:0 6px 16px rgba(184,42,40,.32);
  }

  /* le stelle di fiducia/credibilita' (5, oliva) */
  .stelle{
    position:absolute; top:172px; left:0; right:0; text-align:center;
    font-size:46px; letter-spacing:10px; color:var(--senape); line-height:1;
  }

  /* virgolettone d'apertura, decorativo */
  .apice{
    position:absolute; top:196px; left:90px;
    font-family:'Fraunces',Georgia,serif; font-weight:900; font-style:italic;
    font-size:300px; line-height:.6; color:rgba(90,124,66,.16); z-index:0;
  }

  /* LA CITAZIONE — l'eroe assoluto */
  .citazione{
    position:absolute; left:96px; right:96px; top:300px;
    z-index:2;
    font-family:'Fraunces',Georgia,serif; font-weight:600;
    font-size:74px; line-height:1.18; letter-spacing:-1px;
    color:var(--inchiostro); text-align:left;
  }
  .citazione .ev{ color:var(--terracotta); font-style:italic; font-weight:700; }

  /* riga di firma: nome + quartiere */
  .firma{
    position:absolute; left:96px; right:96px; bottom:288px;
    display:flex; align-items:center; gap:22px;
  }
  .firma .pallino{
    width:74px; height:74px; flex:0 0 74px; border-radius:50%;
    background:var(--oliva); color:var(--panna);
    display:flex; align-items:center; justify-content:center;
    font-family:'Fraunces',Georgia,serif; font-weight:900; font-size:38px;
    box-shadow:0 6px 16px rgba(90,124,66,.30);
  }
  .firma .dati{ display:flex; flex-direction:column; }
  .firma .nome{ font-family:'Fraunces',Georgia,serif; font-weight:700; font-size:40px; color:var(--inchiostro); line-height:1.05; }
  .firma .zona{ font-family:'Inter',sans-serif; font-weight:700; font-size:25px; color:var(--oliva); letter-spacing:.5px; margin-top:4px; }

  /* nastrino fiducia: "ordine verificato" — credibilita' */
  .verificato{
    position:absolute; left:96px; bottom:228px;
    font-family:'Inter',sans-serif; font-weight:700; font-size:21px;
    color:var(--inchiostro); opacity:.62; letter-spacing:.3px;
  }

  /* fascia oliva col claim + brand in fondo */
  .fascia{
    position:absolute; left:46px; right:46px; bottom:46px; height:140px;
    background:var(--oliva); color:var(--panna);
    border-radius:0 0 10px 10px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 48px;
  }
  .fascia .claim{
    font-family:'Fraunces',Georgia,serif; font-weight:700; font-style:italic;
    font-size:30px; line-height:1.18; max-width:560px;
  }
  .fascia .marca{ text-align:right; }
  .fascia .brand{ font-family:'Fraunces',Georgia,serif; font-weight:900; font-size:38px; line-height:1; }
  .fascia .handle{ font-family:'Inter',sans-serif; font-weight:800; font-size:22px; opacity:.92; margin-top:6px; }
</style>
</head>
<body>
  <div class="carta"></div>
  <div class="bordo"></div>
  <div class="filo-top"></div>

  <div class="esempio">Esempio — testimonianza da sostituire</div>

  <div class="occhiello">I tuoi vicini si fidano</div>
  <div class="stelle">★ ★ ★ ★ ★</div>

  <div class="apice">&ldquo;</div>
  <div class="citazione">{{citazione}}</div>

  <div class="firma">
    <div class="pallino">{{iniziale}}</div>
    <div class="dati">
      <div class="nome">{{nome}}</div>
      <div class="zona">{{zona}}</div>
    </div>
  </div>

  <div class="verificato">✓ Ordine verificato su MyCity</div>

  <div class="fascia">
    <div class="claim">La spesa che tiene viva la città.</div>
    <div class="marca">
      <div class="brand">MyCity</div>
      <div class="handle">@mycity.piacenza</div>
    </div>
  </div>
</body>
</html>
