<!doctype html>
<!--
  Template pilastro DOM — "riprova sociale / la causa in numeri".
  Segnaposto: {{titolo}} {{testo}} {{cta}} {{handle}} {{kicker}}
  Stile: fondo inchiostro scuro con accento bronzo (senape), aria "manifesto civico".
-->
<html lang="it">
<head>
<meta charset="utf-8">
<style>
  :root{
    --terracotta:#C0492C; --senape:#E8A33D; --oliva:#5A7C42;
    --bordeaux:#B82A28; --inchiostro:#2C2A28; --panna:#FBF7F0; --bianco:#FFFFFF;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%}
  body{
    font-family:Georgia,'Times New Roman',serif;
    background:var(--inchiostro); color:var(--panna);
    width:100vw;height:100vh;position:relative;overflow:hidden;
    padding:72px 64px;
    display:flex;flex-direction:column;
  }
  .kicker{
    font-family:'Helvetica Neue',Arial,sans-serif; font-weight:700;
    text-transform:uppercase; letter-spacing:6px; font-size:26px; color:var(--senape);
    margin-bottom:30px;
  }
  .titolo{
    font-size:80px; line-height:1.06; font-weight:700; color:var(--panna);
    margin-bottom:40px;
  }
  .rule{ width:140px; height:8px; background:var(--terracotta); margin-bottom:40px; border-radius:4px;}
  .testo{ font-size:40px; line-height:1.46; white-space:pre-line; flex:1; opacity:.95; }
  .cta{
    background:var(--senape); color:var(--inchiostro);
    font-family:'Helvetica Neue',Arial,sans-serif; font-weight:700;
    font-size:34px; padding:28px 34px; border-radius:16px; text-align:center;
    margin:24px 0 28px;
  }
  .brandrow{ display:flex; justify-content:space-between; align-items:baseline; border-top:3px solid var(--senape); padding-top:24px; }
  .brand{ font-size:40px; font-weight:700; color:var(--senape); }
  .tagline{ font-style:italic; font-size:28px; opacity:.85; margin-top:6px; }
  .handle{ font-family:'Helvetica Neue',Arial,sans-serif; font-size:28px; color:var(--panna); font-weight:700; }
</style>
</head>
<body>
  <div class="kicker">{{kicker}}</div>
  <div class="titolo">{{titolo}}</div>
  <div class="rule"></div>
  <div class="testo">{{testo}}</div>
  <div class="cta">{{cta}}</div>
  <div class="brandrow">
    <div>
      <div class="brand">MyCity 🐎</div>
      <div class="tagline">La spesa che tiene viva la città.</div>
    </div>
    <div class="handle">{{handle}}</div>
  </div>
</body>
</html>
