<!doctype html>
<!--
  Template pilastro VEN — "ordina per il weekend" (storia 9:16 tipica).
  Segnaposto: {{titolo}} {{testo}} {{cta}} {{handle}} {{kicker}}
  Stile: fondo terracotta pieno, testo panna, grande, ad alto impatto per le storie.
-->
<html lang="it">
<head>
<meta charset="utf-8">
<style>
  :root{
    --terracotta:#C0492C; --senape:#E8A33D; --oliva:#5A7C42;
    --bordeaux:#B82A28; --inchiostro:#2C2A28; --panna:#FBF7F0; --bianco:#FFFFFF;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%}
  body{
    font-family:Georgia,'Times New Roman',serif;
    background:var(--terracotta); color:var(--panna);
    width:100vw;height:100vh;position:relative;overflow:hidden;
    display:flex;flex-direction:column;justify-content:space-between;
    padding:96px 72px;
  }
  .top{ }
  .kicker{
    font-family:'Helvetica Neue',Arial,sans-serif; font-weight:700;
    text-transform:uppercase; letter-spacing:8px; font-size:30px;
    background:var(--senape); color:var(--inchiostro);
    display:inline-block; padding:16px 30px; border-radius:12px;
  }
  .center{ }
  .titolo{ font-size:92px; line-height:1.05; font-weight:700; margin-bottom:48px; }
  .testo{ font-size:46px; line-height:1.4; white-space:pre-line; opacity:.97; }
  .bottom{ }
  .cta{
    background:var(--panna); color:var(--bordeaux);
    font-family:'Helvetica Neue',Arial,sans-serif; font-weight:700;
    font-size:40px; padding:32px; border-radius:20px; text-align:center;
    margin-bottom:40px;
  }
  .brandrow{ display:flex; justify-content:space-between; align-items:baseline; border-top:3px solid var(--panna); padding-top:26px; }
  .brand{ font-size:44px; font-weight:700; }
  .tagline{ font-style:italic; font-size:30px; opacity:.9; margin-top:6px; }
  .handle{ font-family:'Helvetica Neue',Arial,sans-serif; font-size:30px; font-weight:700; }
</style>
</head>
<body>
  <div class="top"><span class="kicker">{{kicker}}</span></div>
  <div class="center">
    <div class="titolo">{{titolo}}</div>
    <div class="testo">{{testo}}</div>
  </div>
  <div class="bottom">
    <div class="cta">{{cta}}</div>
    <div class="brandrow">
      <div>
        <div class="brand">MyCity 🐎</div>
        <div class="tagline">La spesa che tiene viva la città.</div>
      </div>
      <div class="handle">{{handle}}</div>
    </div>
  </div>
</body>
</html>
