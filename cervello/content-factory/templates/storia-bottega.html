<!doctype html>
<!--
  Template pilastro LUN — "storia di bottega".
  Segnaposto: {{titolo}} {{testo}} {{cta}} {{handle}} {{kicker}}
  Variabili colore iniettate dal motore via :root (vedi render.mjs).
  Pensato per formati verticali/quadrati: bande terracotta + fondo panna + timbro civico (cavallo).
-->
<html lang="it">
<head>
<meta charset="utf-8">
<style>
  :root{
    --terracotta:#C0492C; --senape:#E8A33D; --oliva:#5A7C42;
    --bordeaux:#B82A28; --inchiostro:#2C2A28; --panna:#FBF7F0; --bianco:#FFFFFF;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%}
  body{
    font-family: Georgia, 'Times New Roman', serif;
    background:var(--panna); color:var(--inchiostro);
    width:100vw; height:100vh; position:relative; overflow:hidden;
  }
  /* banda superiore terracotta col kicker */
  .top{
    background:var(--terracotta); color:var(--panna);
    padding:48px 64px 40px; position:relative;
  }
  .kicker{
    font-family:'Helvetica Neue',Arial,sans-serif;
    text-transform:uppercase; letter-spacing:6px; font-size:26px; font-weight:700;
    opacity:.92;
  }
  .timbro{
    position:absolute; top:40px; right:56px; font-size:64px; line-height:1;
  }
  /* corpo */
  .corpo{ padding:60px 64px 0; }
  .titolo{
    font-size:78px; line-height:1.04; font-weight:700; color:var(--bordeaux);
    margin-bottom:40px;
  }
  .testo{
    font-size:40px; line-height:1.42; color:var(--inchiostro);
    white-space:pre-line;
  }
  /* fondo: CTA + brand */
  .fondo{
    position:absolute; left:0; right:0; bottom:0;
    padding:0 64px 56px;
  }
  .cta{
    background:var(--senape); color:var(--inchiostro);
    font-family:'Helvetica Neue',Arial,sans-serif; font-weight:700;
    font-size:34px; padding:28px 36px; border-radius:18px; display:block;
    text-align:center; margin-bottom:28px;
  }
  .brandrow{
    display:flex; justify-content:space-between; align-items:baseline;
    border-top:3px solid var(--terracotta); padding-top:22px;
  }
  .brand{ font-size:40px; font-weight:700; color:var(--terracotta); }
  .tagline{ font-style:italic; font-size:30px; color:var(--inchiostro); opacity:.85; }
  .handle{ font-family:'Helvetica Neue',Arial,sans-serif; font-size:28px; color:var(--oliva); font-weight:700; }
</style>
</head>
<body>
  <div class="top">
    <div class="kicker">{{kicker}}</div>
    <div class="timbro">🐎</div>
  </div>
  <div class="corpo">
    <div class="titolo">{{titolo}}</div>
    <div class="testo">{{testo}}</div>
  </div>
  <div class="fondo">
    <div class="cta">{{cta}}</div>
    <div class="brandrow">
      <div>
        <div class="brand">MyCity</div>
        <div class="tagline">La spesa che tiene viva la città.</div>
      </div>
      <div class="handle">{{handle}}</div>
    </div>
  </div>
</body>
</html>
